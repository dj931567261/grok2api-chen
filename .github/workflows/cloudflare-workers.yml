name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloudflare-workers.yml"
      - "cloudflare/**"

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/package-lock.json

      - name: Install Cloudflare dependencies
        working-directory: cloudflare
        run: npm ci

      - name: Typecheck Worker
        working-directory: cloudflare
        run: npm run typecheck

  deploy-cloudflare:
    needs: validate-cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare/package-lock.json

      - name: Install Cloudflare dependencies
        working-directory: cloudflare
        run: npm ci

      - name: Generate wrangler.ci.toml
        env:
          GITHUB_SHA: ${{ github.sha }}
          CLOUDFLARE_UPSTREAM_BASE_URL: ${{ secrets.CLOUDFLARE_UPSTREAM_BASE_URL }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          upstream = (os.environ.get("CLOUDFLARE_UPSTREAM_BASE_URL") or "").strip()
          build_sha = (os.environ.get("GITHUB_SHA") or "").strip()
          if not upstream:
              raise SystemExit("Missing CLOUDFLARE_UPSTREAM_BASE_URL secret")
          if not re.match(r"^https?://", upstream):
              raise SystemExit("CLOUDFLARE_UPSTREAM_BASE_URL must start with http:// or https://")

          src = Path("cloudflare/wrangler.toml")
          dst = Path("cloudflare/wrangler.ci.toml")
          text = src.read_text(encoding="utf-8")
          text = text.replace("REPLACE_WITH_UPSTREAM_BASE_URL", upstream)
          if build_sha:
              text = re.sub(r'(?m)^BUILD_SHA\s*=\s*"[^"]*"\s*$', f'BUILD_SHA = "{build_sha}"', text)
          dst.write_text(text, encoding="utf-8")
          print(f"Generated {dst}")
          PY

      - name: Verify Worker config
        run: |
          python3 - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("cloudflare/wrangler.ci.toml").open("rb") as f:
              data = tomllib.load(f)

          upstream = str((data.get("vars") or {}).get("UPSTREAM_BASE_URL") or "").strip()
          if not upstream:
              raise SystemExit("wrangler.ci.toml: missing UPSTREAM_BASE_URL")
          if not (upstream.startswith("https://") or upstream.startswith("http://")):
              raise SystemExit("wrangler.ci.toml: invalid UPSTREAM_BASE_URL")

          build_sha = str((data.get("vars") or {}).get("BUILD_SHA") or "").strip()
          if not build_sha or build_sha == "dev":
              raise SystemExit("wrangler.ci.toml: BUILD_SHA not set")

          placement = data.get("placement") or {}
          region = str(placement.get("region") or "").strip()
          if region != "aws:us-east-1":
              raise SystemExit('wrangler.ci.toml: expected placement.region = "aws:us-east-1"')

          print(f"OK: upstream={upstream} build={build_sha}")
          PY

      - name: Deploy Worker
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.ci.toml
